# Aula 2: Integração Contínua
name: CI Integration

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - develop

jobs:
  validacao_e_testes:
    name: Compilação e Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o Repositório
        uses: actions/checkout@v4

      - name: Configurar o Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar Testes Unitarios
        run: mvn clean test

      - name: Compilar e Testar com Maven
        run: mvn clean package

      - name: Compilar Código
        run: mvn clean package -DskipTests

      - name: Scan de Segurança no Código e Dependências (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs' # Analisa arquivos da pasta
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'